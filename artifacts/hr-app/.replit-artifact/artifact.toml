kind = "web"
previewPath = "/"
title = "HR Management"
version = "1.0.0"
id = "artifacts/hr-app"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25180

[services.development]
run = "pnpm --filter @workspace/hr-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hr-app", "run", "build" ]
serve = "static"
publicDir = "artifacts/hr-app/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25180"
BASE_PATH = "/"
